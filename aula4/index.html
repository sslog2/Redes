<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage {Márcio Souto Maior}</title>

    <style>
        body {
            font-family: Verdana, sans-serif;
            margin: 0;
            color: #222;
            background-color: #fff;
        }

        .pular {
            position: absolute;
            top: -40px;
            left: 0;
            background: #333;
            color: #fff;
            padding: 8px;
        }

        .pular:focus {
            top: 0;
        }

        .sidebar {
            height: 100%;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #333;
            padding: 20px;
            color: white;
        }

        .sidebar p,
        .sidebar address {
            font-size: 14px;
        }

        .sidebar a {
            color: #aad4ff;
        }

        main {
            margin-left: 260px;
            padding: 20px;
        }

        .circle-pic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
        }

        figure {
            margin: 10px 0;
        }

        figcaption {
            font-size: 14px;
            color: #666;
        }

        img, video {
            max-width: 100%;
            height: auto;
        }

        audio {
            width: 100%;
        }

        fieldset {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
        }

        legend {
            font-weight: bold;
            color: #555;
        }

        form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }

        form input[type="text"],
        form input[type="email"],
        form input[type="tel"],
        form select,
        form textarea {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            outline: 2px solid #007bff;
        }

        form input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        form input[type="checkbox"] + label {
            display: inline;
            font-weight: normal;
        }

        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        button:hover,
        button:focus {
            background-color: #0056b3;
        }

        footer {
            margin-left: 260px;
            background-color: #eee;
            padding: 15px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        footer a {
            color: #007bff;
        }

        @media (max-width: 600px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                text-align: center;
            }

            main, footer {
                margin-left: 0;
            }

            .circle-pic {
                width: 150px;
                height: 150px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <a href="#principal" class="pular">Pular para o conteúdo</a>

    <nav class="sidebar">

        <img src="images.jpg" alt="Foto de Márcio Souto Maior" class="circle-pic">

        <p><strong>Márcio Souto Maior</strong></p>

        <address>
            Rua das Flores, 456
        </address>

        <p>Minha homepage pode fuçar</p>

    </nav>

    <main id="principal">

        <header>
            <h1>Minhas linguagens favoritas</h1>
        </header>

        <section>
            <h2>Linguagens</h2>
            <ul>
                <li>Python</li>
                <li>Golang</li>
                <li>C</li>
            </ul>
        </section>

        <section>
            <h2>About</h2>
            <p>Página para Aula de Redes</p>
        </section>

        <section>
            <h2>Mídia</h2>
            <figure>
                <video controls width="300">
                    <source src="video.mp4" type="video/mp4">
                    <source src="video.webm" type="video/webm">
                    <track src="legendas.vtt" kind="subtitles" srclang="pt-BR" label="Português">
                    Navegador não suporta vídeo.
                </video>
                <figcaption>Vídeo de apresentação</figcaption>
            </figure>

            <figure>
                <audio controls>
                    <source src="audio.mp3" type="audio/mpeg">
                    Navegador não suporta áudio.
                </audio>
                <figcaption>Melodia de vitória</figcaption>
            </figure>
        </section>

        <section>
            <h2>Contato</h2>
            <form action="#" method="post">
                <fieldset>
                    <legend>Seus Dados</legend>

                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>

                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>

                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" pattern="\(\d{2}\)\s?\d{4,5}-\d{4}">
                </fieldset>

                <fieldset>
                    <legend>Mensagem</legend>

                    <label for="assunto">Assunto</label>
                    <select id="assunto" name="assunto" required>
                        <option value="">Selecione</option>
                        <option value="duvida">Dúvida</option>
                        <option value="sugestao">Sugestão</option>
                        <option value="reclamacao">Reclamação</option>
                    </select>

                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" name="mensagem" rows="4" required></textarea>
                </fieldset>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <address>
            Rua das Flores, 456 - Telefone: <a href="tel:1198888888">(11) 9888-8888</a>
        </address>
    </footer>

    <script>
        document.getElementById('telefone').addEventListener('input', function () {
            var v = this.value.replace(/\D/g, '').substring(0, 11);
            if (v.length > 6) {
                this.value = '(' + v.substring(0, 2) + ') ' + v.substring(2, 7) + '-' + v.substring(7);
            } else if (v.length > 2) {
                this.value = '(' + v.substring(0, 2) + ') ' + v.substring(2);
            } else if (v.length > 0) {
                this.value = '(' + v;
            }
        });
    </script>

</body>

</html>
